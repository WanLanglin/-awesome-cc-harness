<!DOCTYPE html>
<html lang="{{ page.lang | default: 'zh' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c14;
  --bg-surface: #141420;
  --bg-code: #1a1a2e;
  --text: #e2e0dd;
  --text-dim: #8888a0;
  --text-heading: #f0eee8;
  --accent: #818cf8;
  --accent-dim: rgba(129,140,248,0.12);
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --border: #222238;
  --sidebar-w: 280px;
  --serif: 'Instrument Serif', Georgia, serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
  --sans: 'DM Sans', 'Noto Sans SC', system-ui, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  font-size: 18px;
}

/* === TOP NAV === */
.topnav {
  position: fixed; top:0; left:0; right:0; z-index:200;
  background: rgba(12,12,20,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1.5rem;
  display: flex; justify-content: space-between; align-items: center;
  height: 48px;
}
.topnav__title { font-family:var(--serif); font-size:1.05rem; color:var(--text-heading); }
.topnav__links { display:flex; gap:1.2rem; }
.topnav__links a { color:var(--text-dim); text-decoration:none; font-size:0.82rem; transition:color 0.2s; }
.topnav__links a:hover { color:var(--accent); }
.sidebar-toggle { display:none; background:none; border:none; color:var(--text); font-size:1.3rem; cursor:pointer; }

/* === SIDEBAR === */
.sidebar {
  position: fixed; top:48px; left:0; bottom:0;
  width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 1rem 0;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar__section {
  padding: 0.4rem 1rem;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  font-family: var(--mono);
  margin-top: 0.75rem;
}
.sidebar a {
  display: block;
  padding: 0.35rem 1rem 0.35rem 1.5rem;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.82rem;
  line-height: 1.4;
  border-left: 2px solid transparent;
  transition: all 0.15s;
}
.sidebar a:hover, .sidebar a.active {
  color: var(--accent);
  background: var(--accent-dim);
  border-left-color: var(--accent);
}

/* === MAIN CONTENT === */
.main {
  margin-left: var(--sidebar-w);
  margin-top: 48px;
  min-height: calc(100vh - 48px);
}
.article {
  max-width: 860px;
  margin: 0 auto;
  padding: 2.5rem 2rem 6rem;
}

/* Headings */
h1 { font-family:var(--serif); font-size:2.2rem; color:var(--text-heading); margin:2.5rem 0 1.2rem; line-height:1.2; border-bottom:2px solid var(--accent); padding-bottom:0.4rem; }
h2 { font-family:var(--serif); font-size:1.6rem; color:var(--text-heading); margin:2.5rem 0 0.8rem; padding-top:1rem; border-top:1px solid var(--border); }
h3 { font-size:1.15rem; color:var(--accent); margin:1.8rem 0 0.6rem; font-weight:700; }
h4 { font-size:1rem; color:var(--text-heading); margin:1.2rem 0 0.4rem; }
p { margin:0.65rem 0; }
a { color:var(--accent); text-decoration:none; }
a:hover { text-decoration:underline; }

/* Blockquotes */
blockquote {
  border-left:3px solid var(--accent); background:var(--accent-dim);
  padding:0.8rem 1.1rem; margin:1.2rem 0; border-radius:0 8px 8px 0; font-size:0.93rem;
}
blockquote p { margin:0.3rem 0; }
blockquote strong { color:var(--accent); }

/* Code */
pre { background:var(--bg-code); border:1px solid var(--border); border-radius:8px; padding:1rem; overflow-x:auto; margin:0.8rem 0; font-size:0.82rem; line-height:1.55; }
code { font-family:var(--mono); font-size:0.86em; }
p code, li code, td code { background:var(--bg-code); padding:0.12em 0.35em; border-radius:4px; border:1px solid var(--border); font-size:0.83em; }

/* Tables */
table { width:100%; border-collapse:collapse; margin:1.2rem 0; font-size:0.88rem; }
th { background:var(--bg-surface); color:var(--accent); font-weight:700; text-align:left; padding:0.6rem 0.8rem; border-bottom:2px solid var(--accent); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.04em; }
td { padding:0.5rem 0.8rem; border-bottom:1px solid var(--border); }
tr:hover td { background:var(--bg-surface); }

/* Images */
img { max-width:100%; border-radius:8px; border:1px solid var(--border); margin:1.2rem 0; display:block; }
img + em, p > em:only-child { display:block; text-align:center; color:var(--text-dim); font-size:0.82rem; margin-top:-0.5rem; margin-bottom:1.2rem; }

/* Lists */
ul, ol { margin:0.6rem 0; padding-left:1.5rem; }
li { margin:0.25rem 0; }
hr { border:none; border-top:1px solid var(--border); margin:2.5rem 0; }
strong { color:var(--text-heading); }

/* Mermaid raw display */
pre:has(code.language-mermaid) { background:var(--accent-dim); border-color:var(--accent); text-align:center; color:var(--text-dim); font-style:italic; }

/* Scrollbar */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--accent); }

/* === RESPONSIVE === */
@media (max-width: 1024px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .sidebar-toggle { display:block; }
}
@media (max-width: 640px) {
  .article { padding:1.2rem 0.8rem 3rem; }
  h1 { font-size:1.6rem; }
  h2 { font-size:1.3rem; }
  pre { font-size:0.75rem; padding:0.6rem; }
}
</style>
</head>
<body>

<nav class="topnav">
  <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>
  <div class="topnav__title">How Claude Code Works</div>
  <div class="topnav__links">
    <a href="{{ site.baseurl }}/">Home</a>
    <a href="{{ site.baseurl }}/zh/">中文</a>
    <a href="{{ site.baseurl }}/en/">English</a>
    <a href="https://github.com/WanLanglin/-awesome-cc-harness">GitHub</a>
  </div>
</nav>

<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <article class="article" id="article">
  {{ content }}
  </article>
</div>

<script>
// Auto-generate TOC from h2/h3 headings
(function(){
  const sidebar = document.getElementById('sidebar');
  const headings = document.querySelectorAll('.article h2, .article h3');
  let html = '';
  let currentSection = '';
  headings.forEach((h, i) => {
    if (!h.id) h.id = 'heading-' + i;
    if (h.tagName === 'H2') {
      html += '<div class="sidebar__section">' + h.textContent.substring(0,30) + '</div>';
    }
    const indent = h.tagName === 'H3' ? 'padding-left:2.2rem;font-size:0.78rem;' : '';
    html += '<a href="#' + h.id + '" style="' + indent + '">' + h.textContent.substring(0,40) + '</a>';
  });
  sidebar.innerHTML = html;

  // Highlight current section on scroll
  const links = sidebar.querySelectorAll('a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = sidebar.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) { active.classList.add('active'); active.scrollIntoView({block:'nearest'}); }
      }
    });
  }, { rootMargin: '-80px 0px -70% 0px' });
  headings.forEach(h => observer.observe(h));
})();
</script>

</body>
</html>
